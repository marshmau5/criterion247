name: Criterion Bluesky Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python bot.py
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}

      - run: |
          git config user.name "criterion-bot"
          git config user.email "criterion-bot@users.noreply.github.com"
          git add last_seen.txt
          git commit -m "Update last seen movie" || echo "No changes to commit"
          git push
